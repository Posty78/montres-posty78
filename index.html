<head>

<title>Paris - Genève en autostop, sans argent, en live 24/7 !</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root{
    --green: #00cc44;
    --dark: #111417;
    --panel: #1b1f24;
    --text: #eef1f3;
    --muted: #9aa4ad;
    --danger: #ff4d4d;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--dark);color:var(--text);}
  #app{display:flex;flex-direction:column;height:100%;}

  header{
    background:var(--panel);
    padding:10px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    border-bottom:2px solid var(--green);
    flex-wrap:wrap;
  }
  header h1{font-size:16px;margin:0;color:var(--green);}
  header .stats{font-size:13px;color:var(--muted);}
  header .stats b{color:var(--text);}

  #progressBarWrap{
    height:6px;background:#2a2f36;width:100%;
  }
  #progressBar{
    height:100%;background:var(--green);width:0%;transition:width .3s;
  }

  #map{flex:1;min-height:0;position:relative;}

  .controls{
    display:flex;gap:8px;padding:8px 12px;background:var(--panel);flex-wrap:wrap;
    border-top:1px solid #2a2f36;position:relative;z-index:800;
  }
  select,button{
    background:#2a2f36;color:var(--text);border:1px solid #3a4048;
    border-radius:8px;padding:8px 10px;font-size:13px;cursor:pointer;
  }
  button.primary{background:var(--green);color:#04220f;font-weight:700;border:none;}
  button:hover{filter:brightness(1.1);}

  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--text);border-radius:10px;}
  .leaflet-popup-tip{background:var(--panel);}
  .popup-title{font-weight:700;font-size:15px;margin-bottom:2px;color:var(--green);}
  .popup-addr{font-size:12px;color:var(--muted);margin-bottom:6px;}
  .popup-notes{font-size:12px;margin-bottom:8px;}
  .popup-badge{
    display:inline-block;font-size:11px;padding:2px 6px;border-radius:6px;
    background:#2a2f36;margin-bottom:6px;color:var(--muted);
  }
  .popup-btns{display:flex;flex-direction:column;gap:6px;}
  .popup-btns a, .popup-btns button{
    display:block;text-align:center;text-decoration:none;padding:8px;border-radius:8px;
    font-size:13px;font-weight:600;
  }
  .btn-waze{background:#33ccff;color:#062633;}
  .btn-gmaps{background:#4285F4;color:white;}
  .btn-visited{background:#2a2f36;color:var(--text);border:1px solid var(--green);}
  .btn-visited.done{background:var(--green);color:#04220f;border:none;}

  .num-icon{
    background:var(--green);color:#04220f;font-weight:800;border-radius:50%;
    width:26px;height:26px;display:flex;align-items:center;justify-content:center;
    font-size:12px;border:2px solid #04220f;
  }
  .num-icon.visited{background:#555;color:#ccc;opacity:.6;}
  .num-icon.ext{background:#ffb020;color:#331b00;}

  #legend{
    background:rgba(20,24,28,.9);
    padding:6px 12px;font-size:11px;color:var(--muted);
    display:flex;gap:14px;flex-wrap:wrap;
    border-bottom:1px solid #2a2f36;
  }
  #legend span{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;}

  .leaflet-control-attribution{
    font-size:9px !important;
    background:rgba(20,24,28,.5) !important;
    color:#8a8f94 !important;
    padding:1px 4px !important;
    opacity:.6;
  }
  .leaflet-control-attribution a{ color:#8a8f94 !important; }

  @keyframes pulse-red{
    0%{ stroke-opacity:1; fill-opacity:0.35; }
    50%{ stroke-opacity:.4; fill-opacity:0.1; }
    100%{ stroke-opacity:1; fill-opacity:0.35; }
  }
  .pulse-highlight{
    animation: pulse-red 1s ease-in-out infinite;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Paris - Genève en autostop, sans argent, en live 24/7 !</h1>
    <div class="stats" id="stats">Chargement…</div>
  </header>
  <div id="progressBarWrap"><div id="progressBar"></div></div>
  <div id="map"></div>
  <div id="legend">
    <div><span style="background:#00cc44"></span>Centre-ville (parcours à pied)</div>
    <div><span style="background:#ffb020"></span>Extension (transport nécessaire)</div>
    <div><span style="background:#555"></span>Déjà visité</div>
  </div>
  <div class="controls">
    <input type="number" id="searchId" min="1" max="95" placeholder="N° boutique (1-95)" style="width:130px;">
    <button id="searchBtn" class="primary">🔍 Localiser</button>
    <select id="filterZone">
      <option value="all">Toutes les zones</option>
      <option value="centre">Centre-ville seulement</option>
      <option value="extension">Extension seulement</option>
    </select>
    <select id="filterStatus">
      <option value="all">Tout</option>
      <option value="todo">À faire</option>
      <option value="done">Visitées</option>
    </select>
    <button id="resetBtn">🔄 Réinitialiser toute la checklist</button>
  </div>
</div>

<div id="loginModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;align-items:center;justify-content:center;">
  <div style="background:var(--panel);padding:20px;border-radius:12px;width:280px;border:1px solid var(--green);">
    <h3 style="margin-top:0;color:var(--green);font-size:15px;">Connexion</h3>
    <input id="loginEmail" type="email" placeholder="Email" style="width:100%;margin-bottom:8px;padding:8px;border-radius:6px;border:1px solid #3a4048;background:#2a2f36;color:white;">
    <input id="loginPass" type="password" placeholder="Mot de passe" style="width:100%;margin-bottom:10px;padding:8px;border-radius:6px;border:1px solid #3a4048;background:#2a2f36;color:white;">
    <div style="display:flex;gap:8px;">
      <button class="primary" id="doLoginBtn" style="flex:1;">Se connecter</button>
      <button id="cancelLoginBtn" style="flex:1;">Annuler</button>
    </div>
    <div id="loginError" style="color:#ff4d4d;font-size:12px;margin-top:8px;"></div>
  </div>
</div>

// ================= ETAT =================
let visitedState = {}; // {id: true/false}

function shopKey(id){ return "shop_" + id; }

// ================= FIREBASE SYNC =================
function listenToVisited(){
  if(!db){
    // fallback localStorage (pas de synchro entre viewers)
    const saved = localStorage.getItem("visitedState");
    visitedState = saved ? JSON.parse(saved) : {};
    renderAll();
    return;
  }
  db.ref("visited").on("value", snap => {
    visitedState = snap.val() || {};
    renderAll();
  });
}

function setVisited(id, val){
  if(db && !isAdmin){
    return; // silencieux : rien ne se passe pour un non-admin
  }
  visitedState[id] = val;
  if(db){
    db.ref("visited/" + id).set(val);
  } else {
    localStorage.setItem("visitedState", JSON.stringify(visitedState));
    renderAll();
  }
}

function resetAll(){
  if(db && !isAdmin){
    return; // silencieux
  }
  if(!confirm("Réinitialiser toute la checklist pour TOUT LE MONDE ?")) return;
  visitedState = {};
  if(db){
    db.ref("visited").set({});
  } else {
    localStorage.removeItem("visitedState");
    renderAll();
  }
}

// ================= AUTH ADMIN (accès caché) =================
// Raccourci clavier discret pour ouvrir la connexion : Ctrl + Shift + G
// (aucun bouton visible, personne d'autre que toi ne connaît la combinaison)
function updateAdminUI(){
  renderAll();
}

if(auth){
  auth.onAuthStateChanged(user => {
    isAdmin = !!(user && user.uid === ADMIN_UID);
    updateAdminUI();
  });
}

document.addEventListener('keydown', (e) => {
  if(e.ctrlKey && e.shiftKey && e.key === 'G'){
    document.getElementById('loginModal').style.display = 'flex';
  }
});

// Accès mobile : 5 taps rapides sur le titre en haut de page (moins de 2s au total)
let tapCount = 0;
let tapTimer = null;
document.querySelector('header h1')?.addEventListener('click', () => {
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => { tapCount = 0; }, 2000);
  if(tapCount >= 5){
    tapCount = 0;
    document.getElementById('loginModal').style.display = 'flex';
  }
});
document.getElementById('cancelLoginBtn')?.addEventListener('click', () => {
  document.getElementById('loginModal').style.display = 'none';
});
document.getElementById('doLoginBtn')?.addEventListener('click', () => {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if(!auth){ errEl.textContent = "Firebase non configuré."; return; }
  auth.signInWithEmailAndPassword(email, pass)
    .then(() => { document.getElementById('loginModal').style.display = 'none'; })
    .catch(e => { errEl.textContent = "Identifiants incorrects."; });
});

// ================= CARTE =================
const map = L.map('map', {zoomControl:false, attributionControl:false}).setView([46.2044, 6.1460], 15);
L.control.zoom({position:'bottomright'}).addTo(map);
L.control.attribution({prefix:false, position:'bottomright'}).addTo(map);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
}).addTo(map);

let markers = {};
let routeLine = null;

function makeIcon(shop, visited){
  const cls = visited ? "num-icon visited" : (shop.zone === "extension" ? "num-icon ext" : "num-icon");
  const label = shop.zone === "centre" ? shop.order : "★";
  return L.divIcon({
    className: '',
    html: `<div class="${cls}">${label}</div>`,
    iconSize: [26,26]
  });
}

function wazeLink(lat,lng){ return `https://waze.com/ul?ll=${lat},${lng}&navigate=yes`; }
function gmapsLink(lat,lng){ return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`; }

function popupHtml(shop){
  const visited = !!visitedState[shop.id];
  return `
    <div class="popup-title">${shop.name}</div>
    <div class="popup-badge">${shop.zone === 'centre' ? '#' + shop.order + ' · centre-ville' : '★ extension (transport)'}</div>
    <div class="popup-addr">${shop.address}${shop.phone ? ' · ' + shop.phone : ''}</div>
    <div class="popup-notes">${shop.notes}</div>
    <div class="popup-btns">
      <a class="btn-waze" href="${wazeLink(shop.lat, shop.lng)}" target="_blank">🚗 Itinéraire Waze</a>
      <a class="btn-gmaps" href="${gmapsLink(shop.lat, shop.lng)}" target="_blank">📍 Itinéraire Google Maps</a>
      <button class="btn-visited ${visited ? 'done' : ''}" onclick="toggleVisited(${shop.id})">
        ${visited ? '✅ Visité (cliquer pour annuler)' : '☐ Marquer comme visité'}
      </button>
    </div>
  `;
}

function toggleVisited(id){
  setVisited(id, !visitedState[id]);
}
window.toggleVisited = toggleVisited;

function renderAll(){
  const zoneFilter = document.getElementById('filterZone').value;
  const statusFilter = document.getElementById('filterStatus').value;

  // markers
  SHOPS.forEach(shop => {
    const visited = !!visitedState[shop.id];
    let show = true;
    if(zoneFilter !== 'all' && shop.zone !== zoneFilter) show = false;
    if(statusFilter === 'todo' && visited) show = false;
    if(statusFilter === 'done' && !visited) show = false;

    if(markers[shop.id]){
      map.removeLayer(markers[shop.id]);
      delete markers[shop.id];
    }
    if(show){
      const m = L.marker([shop.lat, shop.lng], {icon: makeIcon(shop, visited)}).addTo(map);
      m.bindPopup(popupHtml(shop));
      markers[shop.id] = m;
    }
  });

  // route line (zone centre uniquement, triée par order)
  if(routeLine){ map.removeLayer(routeLine); }
  if(zoneFilter === 'all' || zoneFilter === 'centre'){
    const centreShops = SHOPS.filter(s => s.zone === 'centre').sort((a,b)=>a.order-b.order);
    const coords = centreShops.map(s => [s.lat, s.lng]);
    routeLine = L.polyline(coords, {color:'#00cc44', weight:2, opacity:0.5, dashArray:'6,6'}).addTo(map);
  }

  // stats
  const total = SHOPS.length;
  const done = SHOPS.filter(s => visitedState[s.id]).length;
  const centreTotal = SHOPS.filter(s=>s.zone==='centre').length;
  const centreDone = SHOPS.filter(s=>s.zone==='centre' && visitedState[s.id]).length;
  document.getElementById('stats').innerHTML = `<b>${done}/${total}</b> visitées · centre-ville : <b>${centreDone}/${centreTotal}</b>`;
  document.getElementById('progressBar').style.width = (total ? (done/total*100) : 0) + '%';
}

// ================= UI =================
document.getElementById('filterZone').addEventListener('change', renderAll);
document.getElementById('filterStatus').addEventListener('change', renderAll);
document.getElementById('resetBtn').addEventListener('click', resetAll);

// ================= RECHERCHE PAR NUMÉRO =================
let highlightLayer = null;
let highlightTimer = null;

function locateShop(){
  const val = parseInt(document.getElementById('searchId').value, 10);
  if(!val){ return; }
  const shop = SHOPS.find(s => s.id === val);
  if(!shop){
    alert("Pas de boutique n°" + val + ". Les numéros vont de 1 à " + SHOPS.length + ".");
    return;
  }

  // s'assurer que le filtre de zone n'empêche pas l'affichage
  document.getElementById('filterZone').value = 'all';
  document.getElementById('filterStatus').value = 'all';
  renderAll();

  map.setView([shop.lat, shop.lng], 18, {animate:true});

  if(highlightLayer){ map.removeLayer(highlightLayer); }
  if(highlightTimer){ clearTimeout(highlightTimer); }

  highlightLayer = L.circleMarker([shop.lat, shop.lng], {
    radius: 22,
    color: '#ff0000',
    weight: 4,
    fillColor: '#ff0000',
    fillOpacity: 0.25,
    className: 'pulse-highlight'
  }).addTo(map);

  if(markers[shop.id]){
    markers[shop.id].openPopup();
  }

  highlightTimer = setTimeout(() => {
    if(highlightLayer){ map.removeLayer(highlightLayer); highlightLayer = null; }
  }, 8000);
}

document.getElementById('searchBtn').addEventListener('click', locateShop);
document.getElementById('searchId').addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){ locateShop(); }
});

listenToVisited();
</script>
